<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tabunganku</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <!-- Navbar -->
    <nav class="navbar">
      <div class="nav-brand">💰 Tabunganku</div>
      <div class="nav-links">
        <button class="nav-btn active" onclick="showPage('dashboard')">Dashboard</button>
        <button class="nav-btn" onclick="showPage('wadah')">Wadah</button>
        <button class="nav-btn" onclick="showPage('transaksi')">Transaksi</button>
        <button class="nav-btn" onclick="showPage('hutangpiutang')">Hutang/Piutang</button>
        <button class="nav-btn" onclick="showPage('laporan')">Laporan</button>
      </div>
    </nav>

    <!-- Pages -->
    <main class="main-content">
      <div id="page-dashboard" class="page active"></div>
      <div id="page-wadah" class="page"></div>
      <div id="page-transaksi" class="page"></div>
      <div id="page-hutangpiutang" class="page"></div>
      <div id="page-laporan" class="page"></div>
    </main>
  </div>

  <!-- Modal -->
  <div id="modal-overlay" class="modal-overlay hidden" onclick="closeModal()">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-header">
        <h3 id="modal-title">Modal</h3>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div id="modal-body" class="modal-body"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
